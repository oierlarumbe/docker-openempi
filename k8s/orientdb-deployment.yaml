apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: orientdb-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orientdb
  labels:
    app: orientdb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orientdb
  template:
    metadata:
      labels:
        app: orientdb
    spec:
      containers:
        - name: orientdb
          image: openempi-orientdb:latest
          imagePullPolicy: Never          # usa imagen local de Minikube
          ports:
            - containerPort: 2424         # protocolo binario
            - containerPort: 2480         # consola web
          env:
            - name: ORIENTDB_ROOT_PASSWORD
              value: "openempi"
          volumeMounts:
            - name: orientdb-storage
              mountPath: /opt/orientdb/databases
          readinessProbe:
            tcpSocket:
              port: 2424
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: orientdb-storage
          persistentVolumeClaim:
            claimName: orientdb-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: orientdb
spec:
  selector:
    app: orientdb
  ports:
    - name: binary
      port: 2424
      targetPort: 2424
    - name: http
      port: 2480
      targetPort: 2480
  type: ClusterIP
